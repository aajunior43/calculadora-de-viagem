server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    absolute_redirect off;
    port_in_redirect off;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = /favoritos {
        return 301 /favoritos/;
    }

    location /favoritos/ {
        proxy_pass http://favoritos/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /markify-creator/ {
        try_files $uri $uri/ /markify-creator/index.html;
    }

    location /prompt-palace-ai-hub/ {
        try_files $uri $uri/ /prompt-palace-ai-hub/index.html;
    }

    location /tidy-tasks-bloom/ {
        try_files $uri $uri/ /tidy-tasks-bloom/index.html;
    }

    location /inaja-fornecimento-digital/ {
        try_files $uri $uri/ /inaja-fornecimento-digital/index.html;
    }

    location /calculadoradediferenca/ {
        try_files $uri $uri/ /calculadoradediferenca/index.html;
    }

    location = /organizador {
        return 301 /organizador/;
    }

    location /organizador/ {
        try_files $uri $uri/ /organizador/index.html;
    }

    location /color-gemini-canvas/ {
        try_files $uri $uri/ /color-gemini-canvas/index.html;
    }

    location /meus-repositorios-github/ {
        try_files $uri $uri/ /meus-repositorios-github/index.html;
    }

    location = /link-stash {
        return 301 /link-stash/;
    }

    location /link-stash/api/ {
        proxy_pass http://link-stash-api:8770/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /link-stash/ {
        try_files $uri $uri/ /link-stash/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        location ~* \.(?:css|js|svg|png|jpg|jpeg|webp|ico)$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|svg|png|jpg|jpeg|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
