<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relógio Pixel Art</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--font:'Press Start 2P',monospace;--transition:0.35s cubic-bezier(.4,0,.2,1)}
[data-theme="dark"]{
  --bg:#0a0a0a;
  --text:#00ff41;--text-dim:#007a1d;
  --glow:0 0 10px #00ff41,0 0 20px #00ff41,0 0 40px #00ff41;
  --glow-dim:0 0 6px #00ff4150;
  --card-bg:#0d0d0d;--card-border:#1a1a1a;
  --accent:#00ff41;
}
[data-theme="light"]{
  --bg:#e8ecf0;
  --text:#1a1a2e;--text-dim:#6b7280;
  --glow:none;
  --glow-dim:none;
  --card-bg:#fff;--card-border:#d1d5db;
  --accent:#4f46e5;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;transition:background var(--transition),color var(--transition)}

.theme-btn{
  position:fixed;top:16px;right:16px;
  width:40px;height:40px;border-radius:8px;
  border:2px solid var(--card-border);background:var(--card-bg);
  color:var(--text);font-size:1rem;cursor:pointer;
  transition:all var(--transition);
  display:flex;align-items:center;justify-content:center;
  font-family:sans-serif;
}
.theme-btn:hover{border-color:var(--accent);transform:scale(1.1)}

.clock{
  text-align:center;
  padding:40px 24px;
  border:2px solid var(--card-border);
  border-radius:16px;
  background:var(--card-bg);
  box-shadow:var(--glow-dim);
  max-width:500px;width:100%;
}

.time{
  font-size:clamp(28px,8vw,56px);
  text-shadow:var(--glow);
  letter-spacing:4px;
  line-height:1.2;
  margin-bottom:16px;
}
.time .sec{
  font-size:clamp(16px,4vw,28px);
  opacity:0.6;
  vertical-align:top;
}

.date{
  font-size:clamp(8px,2.5vw,12px);
  text-shadow:var(--glow-dim);
  opacity:0.8;
  margin-bottom:8px;
}

.day{
  font-size:clamp(7px,2vw,10px);
  text-shadow:var(--glow-dim);
  opacity:0.5;
  letter-spacing:2px;
}

.dots{
  font-size:clamp(10px,3vw,16px);
  text-shadow:var(--glow);
  margin:12px 0;
  opacity:0.3;
}

.blink{
  animation:blink 1s steps(1) infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.author{
  position:fixed;bottom:16px;
  font-size:7px;
  text-shadow:var(--glow-dim);
  opacity:0.4;
  text-align:center;
}
.author span{opacity:1;color:var(--accent)}

/* Scanlines effect */
.scanlines{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:999;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
}

@media(max-width:500px){
  .clock{padding:24px 16px}
}
</style>
</head>
<body>

<div class="scanlines"></div>
<button class="theme-btn" onclick="toggleTheme()" aria-label="Alternar tema">☀️</button>

<div class="clock">
  <div class="time">
    <span id="h">00</span><span class="blink">:</span><span id="m">00</span><span class="sec">:<span id="s">00</span></span>
  </div>
  <div class="dots">■ ■ ■ ■ ■</div>
  <div class="date" id="date"></div>
  <div class="day" id="day"></div>
</div>

<div class="author">Dev <span>Aleksandro Alves</span></div>

<script>
/* Theme */
function toggleTheme(){
  const h=document.documentElement;
  const b=document.querySelector('.theme-btn');
  const d=h.getAttribute('data-theme')==='dark';
  h.setAttribute('data-theme',d?'light':'dark');
  b.textContent=d?'🌙':'☀️';
  localStorage.setItem('relogioTheme',d?'light':'dark');
}
(function(){
  const s=localStorage.getItem('relogioTheme');
  if(s){
    document.documentElement.setAttribute('data-theme',s);
    document.querySelector('.theme-btn').textContent=s==='dark'?'☀️':'🌙';
  }
})();

/* Clock */
function update(){
  const n=new Date();
  document.getElementById('h').textContent=String(n.getHours()).padStart(2,'0');
  document.getElementById('m').textContent=String(n.getMinutes()).padStart(2,'0');
  document.getElementById('s').textContent=String(n.getSeconds()).padStart(2,'0');

  const days=['DOMINGO','SEGUNDA','TERÇA','QUARTA','QUINTA','SEXTA','SÁBADO'];
  const months=['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];

  document.getElementById('date').textContent=
    String(n.getDate()).padStart(2,'0')+' '+months[n.getMonth()]+' '+n.getFullYear();
  document.getElementById('day').textContent=days[n.getDay()];
}

setInterval(update,1000);
update();
</script>
</body>
</html>
