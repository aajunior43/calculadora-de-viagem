<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Formatador de mensagens WhatsApp com negrito, itálico, tachado, monospace e templates prontos.">
  <meta name="theme-color" content="#0a0a1a">
  <title>Formatador de Mensagens WhatsApp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root, [data-theme="dark"] {
      color-scheme: dark;
      --bg: #0a0a1a;
      --bg-grad: linear-gradient(135deg, #0a0a1a 0%, #0d1117 50%, #0a0a1a 100%);
      --card: rgba(18, 18, 40, 0.85);
      --card-border: rgba(255, 255, 255, 0.06);
      --text: #e8e8f0;
      --text-soft: #c7d2fe;
      --text-muted: #8b8ba0;
      --primary: #e11d48;
      --primary-dim: rgba(225, 29, 72, 0.12);
      --primary-glow: rgba(225, 29, 72, 0.25);
      --green: #10b981;
      --green-dim: rgba(16, 185, 129, 0.12);
      --red: #ef4444;
      --red-dim: rgba(239, 68, 68, 0.12);
      --yellow: #f59e0b;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --tag-bg: rgba(255, 255, 255, 0.05);
      --input-bg: rgba(255, 255, 255, 0.04);
      --input-border: rgba(255, 255, 255, 0.08);
      --tab-active: rgba(225, 29, 72, 0.15);
    }

    [data-theme="light"] {
      color-scheme: light;
      --bg: #f0f2f5;
      --bg-grad: linear-gradient(135deg, #f0f2f5 0%, #e8ecf0 50%, #f0f2f5 100%);
      --card: rgba(255, 255, 255, 0.92);
      --card-border: rgba(0, 0, 0, 0.06);
      --text: #1a1a2e;
      --text-soft: #334155;
      --text-muted: #6b7280;
      --primary: #be123c;
      --primary-dim: rgba(190, 18, 60, 0.08);
      --primary-glow: rgba(190, 18, 60, 0.15);
      --green: #059669;
      --green-dim: rgba(5, 150, 105, 0.08);
      --red: #dc2626;
      --red-dim: rgba(220, 38, 38, 0.08);
      --yellow: #d97706;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      --tag-bg: rgba(0, 0, 0, 0.04);
      --input-bg: rgba(0, 0, 0, 0.03);
      --input-border: rgba(0, 0, 0, 0.08);
      --tab-active: rgba(190, 18, 60, 0.1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-grad);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      padding: 20px;
      transition: background 0.5s cubic-bezier(0.22, 1, 0.36, 1), color 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      padding-bottom: 60px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 44px;
      height: 44px;
      background: var(--primary-dim);
      border: 1.5px solid var(--primary);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }
    .header-title {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.01em;
    }
    .header-sub {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-weight: 500;
      margin-top: 1px;
    }
    .theme-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1.5px solid var(--card-border);
      background: var(--card);
      color: var(--text);
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .theme-btn:hover {
      border-color: var(--primary);
      transform: scale(1.05);
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .tab-btn {
      flex: 1;
      padding: 10px 8px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      border-radius: 11px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .tab-btn.active {
      background: var(--primary-dim);
      color: var(--primary);
    }
    .tab-btn:hover:not(.active) {
      color: var(--text);
      background: var(--tag-bg);
    }
    .tab-panel {
      display: none;
    }
    .tab-panel.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      margin-bottom: 16px;
    }

    /* ── Format Buttons ── */
    .format-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .format-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .format-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 12px 6px;
      border: 1.5px solid var(--card-border);
      background: var(--tag-bg);
      color: var(--text);
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .format-btn span {
      font-size: 1.1rem;
    }
    .format-btn:hover {
      border-color: var(--primary);
      background: var(--primary-dim);
      color: var(--primary);
      transform: translateY(-2px);
    }
    .format-btn:active {
      transform: scale(0.96);
    }

    /* ── Textarea ── */
    .input-group {
      position: relative;
      margin-bottom: 12px;
    }
    .textarea {
      width: 100%;
      min-height: 140px;
      padding: 14px;
      background: var(--input-bg);
      border: 1.5px solid var(--input-border);
      border-radius: 14px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-dim);
    }
    .textarea::placeholder {
      color: var(--text-muted);
      opacity: 0.6;
    }

    /* ── Stats Bar ── */
    .stats-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .stat {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
    }
    .stat-icon {
      font-size: 0.85rem;
    }
    .stat-value {
      color: var(--text);
    }
    .stat-value.warn {
      color: var(--red);
    }
    .char-limit {
      margin-left: auto;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 700;
      transition: all 0.3s;
    }
    .char-limit.ok {
      background: var(--green-dim);
      color: var(--green);
    }
    .char-limit.warn {
      background: var(--red-dim);
      color: var(--red);
    }

    /* ── Action Buttons ── */
    .action-row {
      display: flex;
      gap: 8px;
    }
    .action-btn {
      flex: 1;
      padding: 11px 14px;
      border: 1.5px solid var(--card-border);
      background: var(--tag-bg);
      color: var(--text);
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .action-btn:hover {
      border-color: var(--primary);
      background: var(--primary-dim);
      color: var(--primary);
      transform: translateY(-1px);
    }
    .action-btn:active {
      transform: scale(0.97);
    }
    .action-btn.primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .action-btn.primary:hover {
      filter: brightness(1.15);
      transform: translateY(-1px);
    }
    .action-btn.green {
      background: var(--green-dim);
      color: var(--green);
      border-color: var(--green);
    }
    .action-btn.green:hover {
      background: var(--green);
      color: #fff;
    }

    /* ── Preview ── */
    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .preview-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }
    .preview-badge {
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 0.65rem;
      font-weight: 700;
      background: var(--green-dim);
      color: var(--green);
    }
    .preview-box {
      background: var(--input-bg);
      border: 1.5px solid var(--input-border);
      border-radius: 14px;
      padding: 16px;
      min-height: 100px;
      font-size: 0.85rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .preview-box strong {
      font-weight: 700;
    }
    .preview-box em {
      font-style: italic;
    }
    .preview-box del {
      text-decoration: line-through;
      opacity: 0.7;
    }
    .preview-box code {
      font-family: 'JetBrains Mono', monospace;
      background: var(--tag-bg);
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 0.82rem;
      border: 1px solid var(--card-border);
    }
    .preview-empty {
      color: var(--text-muted);
      font-style: italic;
      opacity: 0.5;
    }

    /* ── Templates ── */
    .templates-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .templates-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .template-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 12px;
      border: 1.5px solid var(--card-border);
      background: var(--tag-bg);
      color: var(--text);
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: left;
    }
    .template-btn span {
      font-size: 1rem;
    }
    .template-btn:hover {
      border-color: var(--primary);
      background: var(--primary-dim);
      color: var(--primary);
      transform: translateY(-2px);
    }

    /* ── List Generator ── */
    .list-input {
      width: 100%;
      padding: 12px;
      background: var(--input-bg);
      border: 1.5px solid var(--input-border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      line-height: 1.6;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .list-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-dim);
    }
    .list-input::placeholder {
      color: var(--text-muted);
      opacity: 0.6;
    }
    .list-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .list-preview {
      background: var(--input-bg);
      border: 1.5px solid var(--input-border);
      border-radius: 12px;
      padding: 12px;
      margin-top: 10px;
      font-size: 0.8rem;
      line-height: 1.6;
      white-space: pre-wrap;
      min-height: 60px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Watermark ── */
    .watermark {
      text-align: center;
      padding: 24px 0 8px;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-muted);
      opacity: 0.5;
    }

    /* ── Toast ── */
    .toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      pointer-events: none;
    }
    .toast {
      background: var(--card);
      border: 1.5px solid var(--card-border);
      border-radius: 14px;
      padding: 12px 20px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transform: translateY(20px) scale(0.95);
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .toast.success {
      border-color: var(--green);
    }
    .toast.success .toast-icon {
      color: var(--green);
    }
    .toast.info {
      border-color: var(--primary);
    }
    .toast.info .toast-icon {
      color: var(--primary);
    }

    /* ── Responsive ── */
    @media (max-width: 400px) {
      body { padding: 12px; }
      .card { padding: 16px; }
      .format-grid { grid-template-columns: repeat(4, 1fr); gap: 6px; }
      .format-btn { padding: 10px 4px; font-size: 0.6rem; }
      .templates-grid { grid-template-columns: 1fr 1fr; gap: 6px; }
      .template-btn { padding: 10px 8px; font-size: 0.68rem; }
      .stats-bar { gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <div class="logo">💬</div>
        <div>
          <div class="header-title">Formatador WhatsApp</div>
          <div class="header-sub">Mensagens formatadas com estilo</div>
        </div>
      </div>
      <button class="theme-btn" id="themeToggle" title="Alternar tema">🌙</button>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="editor">✏️ Editor</button>
      <button class="tab-btn" data-tab="templates">📋 Templates</button>
      <button class="tab-btn" data-tab="preview">👁️ Preview</button>
    </nav>

    <!-- ═══ EDITOR TAB ═══ -->
    <section class="tab-panel active" id="tab-editor">
      <div class="card">
        <div class="format-label">Formatação</div>
        <div class="format-grid">
          <button class="format-btn" data-format="bold"><span>𝐁</span>Negrito</button>
          <button class="format-btn" data-format="italic"><span>𝐼</span>Itálico</button>
          <button class="format-btn" data-format="strike"><span>S̶</span>Tachado</button>
          <button class="format-btn" data-format="mono"><span>⌨</span>Monospace</button>
        </div>

        <div class="input-group">
          <textarea class="textarea" id="editor" placeholder="Digite sua mensagem aqui..."></textarea>
        </div>

        <div class="stats-bar">
          <div class="stat">
            <span class="stat-icon">🔤</span>
            <span>Chars:</span>
            <span class="stat-value" id="charCount">0</span>
          </div>
          <div class="stat">
            <span class="stat-icon">📝</span>
            <span>Palavras:</span>
            <span class="stat-value" id="wordCount">0</span>
          </div>
          <div class="char-limit ok" id="charLimit">0 / 4096</div>
        </div>

        <div class="action-row">
          <button class="action-btn" id="copyBtn">📋 Copiar</button>
          <button class="action-btn" id="clearBtn">🗑️ Limpar</button>
          <button class="action-btn primary" id="copyFormatted">✨ Copiar Formatado</button>
        </div>
      </div>
    </section>

    <!-- ═══ TEMPLATES TAB ═══ -->
    <section class="tab-panel" id="tab-templates">
      <div class="card">
        <div class="templates-label">Templates Prontos</div>
        <div class="templates-grid">
          <button class="template-btn" data-template="venda"><span>💰</span>Vendas</button>
          <button class="template-btn" data-template="promocao"><span>🏷️</span>Promoção</button>
          <button class="template-btn" data-template="evento"><span>🎉</span>Evento</button>
          <button class="template-btn" data-template="convite"><span>📨</span>Convite</button>
          <button class="template-btn" data-template="cobranca"><span>💳</span>Cobrança</button>
          <button class="template-btn" data-template="agradecimento"><span>🙏</span>Agradecimento</button>
        </div>
      </div>
    </section>

    <!-- ═══ PREVIEW TAB ═══ -->
    <section class="tab-panel" id="tab-preview">
      <div class="card">
        <div class="preview-header">
          <span class="preview-title">Preview da Mensagem</span>
          <span class="preview-badge">● Tempo real</span>
        </div>
        <div class="preview-box" id="previewBox">
          <span class="preview-empty">Comece a digitar no editor para ver a formatação...</span>
        </div>
      </div>

      <div class="card">
        <div class="format-label">Gerador de Listas</div>
        <textarea class="list-input" id="listInput" placeholder="Digite seus itens, um por linha..."></textarea>
        <div class="list-actions">
          <button class="action-btn" id="listBullet">• Bullet</button>
          <button class="action-btn" id="listNumber">1. Números</button>
          <button class="action-btn" id="listEmoji">✅ Emoji</button>
          <button class="action-btn green" id="listCopy">📋 Copiar</button>
        </div>
        <div class="list-preview" id="listPreview"></div>
      </div>
    </section>

    <div class="watermark">Dev Aleksandro Alves</div>
  </div>

  <div class="toast-container">
    <div class="toast" id="toast">
      <span class="toast-icon" id="toastIcon">✓</span>
      <span id="toastMsg">Mensagem copiada!</span>
    </div>
  </div>

  <script>
    /* ═══════════════════════════════════════════
       STATE & REFS
       ═══════════════════════════════════════════ */
    const editor = document.getElementById('editor');
    const previewBox = document.getElementById('previewBox');
    const charCountEl = document.getElementById('charCount');
    const wordCountEl = document.getElementById('wordCount');
    const charLimitEl = document.getElementById('charLimit');
    const listInput = document.getElementById('listInput');
    const listPreview = document.getElementById('listPreview');
    const toast = document.getElementById('toast');
    const toastMsg = document.getElementById('toastMsg');
    const toastIcon = document.getElementById('toastIcon');
    const themeToggle = document.getElementById('themeToggle');

    const MAX_CHARS = 4096;

    /* ═══════════════════════════════════════════
       TEMPLATES
       ═══════════════════════════════════════════ */
    const templates = {
      venda: `🔥 *OFERTA EXCLUSIVA* 🔥

⏰ *Vagas limitadas!* Garanta a sua agora!

👉 Responda *SIM* para mais informações!`,

      promocao: `🎉 *PROMOÇÃO IMPERDÍVEL* 🎉

📣 _Aproveite antes que acabe!_

🏷️ *Desconto de até 50%*
📦 Em *TODOS* os produtos
🔄 *Troca garantida* em 30 dias

⚡ Oferta válida até *30/06/2026*
📍 Não perca essa chance!

💬 Fale conosco e garanta o seu!`,

      evento: `🎉 *VOCÊ ESTÁ CONVIDADO!* 🎉

📅 *Data:* 15 de Julho de 2026
🕕 *Horário:* 19h às 23h
📍 *Local:* Centro de Eventos - Sala VIP

🌟 *Programação:*
• Palestra motivacional
• Banda ao vivo
• Open bar premium
• Sorteio de prêmios

👔 *Dress code:* Social

✅ *Confirme sua presença até 10/07!`,

      convite: `📨 *Convite Especial*

Oi, tudo bem? 😊

    /* ═══════════════════════════════════════════
       THEME
       ═══════════════════════════════════════════ */
    function getTheme() {
      return localStorage.getItem('whatsapp-theme') || 'dark';
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('whatsapp-theme', theme);
      themeToggle.textContent = theme === 'dark' ? '🌙' : '☀️';
    }

    setTheme(getTheme());

    themeToggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
    });

    /* ═══════════════════════════════════════════
       TABS
       ═══════════════════════════════════════════ */
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    /* ═══════════════════════════════════════════
       TOAST
       ═══════════════════════════════════════════ */
    let toastTimer;
    function showToast(msg, type = 'success') {
      clearTimeout(toastTimer);
      toastIcon.textContent = type === 'success' ? '✓' : 'ℹ';
      toastMsg.textContent = msg;
      toast.className = 'toast ' + type + ' show';
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
    }

    /* ═══════════════════════════════════════════
       EDITOR — FORMAT
       ═══════════════════════════════════════════ */
    document.querySelectorAll('.format-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const fmt = btn.dataset.format;
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        const text = editor.value;
        const selected = text.substring(start, end);

        let formatted, cursorOffset;
        switch (fmt) {
          case 'bold':
            formatted = `*${selected || 'texto'}*`;
            break;
          case 'italic':
            formatted = `_${selected || 'texto'}_`;
            break;
          case 'strike':
            formatted = `~${selected || 'texto'}~`;
            break;
          case 'mono':
            formatted = '```' + (selected || 'código') + '```';
            break;
        }

        editor.value = text.substring(0, start) + formatted + text.substring(end);
        const newPos = start + formatted.length;
        editor.setSelectionRange(newPos, newPos);
        editor.focus();
        updateEditor();
      });
    });

    /* ═══════════════════════════════════════════
       EDITOR — STATS & PREVIEW
       ═══════════════════════════════════════════ */
    function updateEditor() {
      const text = editor.value;
      const chars = text.length;
      const words = text.trim() ? text.trim().split(/\s+/).length : 0;

      charCountEl.textContent = chars;
      wordCountEl.textContent = words;
      charLimitEl.textContent = `${chars} / ${MAX_CHARS}`;
      charLimitEl.className = 'char-limit ' + (chars > MAX_CHARS ? 'warn' : 'ok');

      /* live preview */
      let html = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\*([^*]+)\*/g, '<strong>$1</strong>')
        .replace(/_([^_]+)_/g, '<em>$1</em>')
        .replace(/~([^~]+)~/g, '<del>$1</del>')
        .replace(/```([^`]+)```/g, '<code>$1</code>');

      previewBox.innerHTML = html || '<span class="preview-empty">Comece a digitar no editor para ver a formatação...</span>';
    }

    editor.addEventListener('input', updateEditor);

    /* ═══════════════════════════════════════════
       EDITOR — ACTIONS
       ═══════════════════════════════════════════ */
    document.getElementById('copyBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(editor.value).then(() => showToast('Texto copiado!'));
    });

    document.getElementById('copyFormatted').addEventListener('click', () => {
      navigator.clipboard.writeText(editor.value).then(() => showToast('Formatado copiado!'));
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      editor.value = '';
      updateEditor();
      showToast('Editor limpo', 'info');
    });

    /* ═══════════════════════════════════════════
       TEMPLATES
       ═══════════════════════════════════════════ */
    document.querySelectorAll('.template-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tpl = templates[btn.dataset.template];
        if (tpl) {
          editor.value = tpl;
          updateEditor();
          /* switch to editor tab */
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
          document.querySelector('[data-tab="editor"]').classList.add('active');
          document.getElementById('tab-editor').classList.add('active');
          showToast('Template aplicado!');
        }
      });
    });

    /* ═══════════════════════════════════════════
       LIST GENERATOR
       ═══════════════════════════════════════════ */
    function generateList(type) {
      const lines = listInput.value.split('\n').filter(l => l.trim());
      if (!lines.length) {
        listPreview.textContent = 'Digite itens na caixa acima.';
        return;
      }
      let result;
      switch (type) {
        case 'bullet':
          result = lines.map(l => `• ${l.trim()}`).join('\n');
          break;
        case 'number':
          result = lines.map((l, i) => `${i + 1}. ${l.trim()}`).join('\n');
          break;
        case 'emoji':
          result = lines.map(l => `✅ ${l.trim()}`).join('\n');
          break;
      }
      listPreview.textContent = result;
    }

    document.getElementById('listBullet').addEventListener('click', () => generateList('bullet'));
    document.getElementById('listNumber').addEventListener('click', () => generateList('number'));
    document.getElementById('listEmoji').addEventListener('click', () => generateList('emoji'));

    document.getElementById('listCopy').addEventListener('click', () => {
      const text = listPreview.textContent;
      if (text && text !== 'Digite itens na caixa acima.') {
        navigator.clipboard.writeText(text).then(() => showToast('Lista copiada!'));
      }
    });

    /* ═══════════════════════════════════════════
       INIT
       ═══════════════════════════════════════════ */
    updateEditor();
  </script>
