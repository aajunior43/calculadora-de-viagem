<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contagem Regressiva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{
  color-scheme:dark;
  --bg:#0a0c14;
  --bg-grad:#0f1220;
  --surface:rgba(20,25,40,0.70);
  --surface-solid:#141928;
  --surface-hover:rgba(40,48,72,0.8);
  --border:rgba(225,29,72,0.08);
  --primary:#e11d48;
  --primary-soft:#be123c;
  --primary-dim:rgba(225,29,72,0.12);
  --primary-glow:rgba(225,29,72,0.20);
  --green:#10b981;
  --green-dim:rgba(16,185,129,0.12);
  --text:#f1f3f5;
  --text-soft:#c9cdd4;
  --text-muted:#8892a4;
  --text-dim:#5c6573;
  --radius:20px;
  --radius-sm:12px;
  --radius-xs:8px;
  --shadow:0 8px 32px rgba(0,0,0,0.5),0 0 0 1px var(--border);
  --transition:0.35s cubic-bezier(.22,1,.36,1)
}
[data-theme="light"]{
  color-scheme:light;
  --bg:#eff1f5;
  --bg-grad:#e6e9ef;
  --surface:rgba(255,255,255,0.75);
  --surface-solid:#ffffff;
  --surface-hover:rgba(240,242,248,0.9);
  --border:rgba(190,18,60,0.08);
  --primary:#be123c;
  --primary-soft:#e11d48;
  --primary-dim:rgba(190,18,60,0.08);
  --primary-glow:rgba(190,18,60,0.12);
  --green:#059669;
  --green-dim:rgba(5,150,105,0.08);
  --text:#0f172a;
  --text-soft:#1e293b;
  --text-muted:#64748b;
  --text-dim:#94a3b8;
  --shadow:0 4px 20px rgba(0,0,0,0.06),0 0 0 1px var(--border)
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  background-image:radial-gradient(ellipse 700px 350px at 50% -5%,var(--primary-dim),transparent);
  color:var(--text);
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:18px 16px;
  -webkit-font-smoothing:antialiased;
  transition:background 0.5s var(--transition),color 0.5s var(--transition)
}
.wrapper{
  width:100%;
  max-width:560px;
  display:flex;
  flex-direction:column;
  gap:14px;
  flex:1
}
.theme-btn{
  position:fixed;
  top:14px;right:14px;
  z-index:99;
  width:38px;height:38px;
  border-radius:var(--radius-sm);
  border:1px solid var(--border);
  background:var(--surface);
  backdrop-filter:blur(16px);
  color:var(--text);
  font-size:.95rem;
  cursor:pointer;
  display:grid;
  place-items:center;
  transition:all var(--transition);
  font-family:inherit
}
.theme-btn:hover{border-color:var(--primary);transform:scale(1.08);background:var(--surface-hover)}
.card{
  background:var(--surface);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:20px 18px;
  transition:all var(--transition)
}
.card-title{
  font-size:1rem;
  font-weight:600;
  margin-bottom:14px;
  display:flex;
  align-items:center;
  gap:8px
}
.card-title i{color:var(--primary)}
.form-row{
  display:flex;
  gap:8px;
  flex-wrap:wrap
}
.form-row input{
  flex:1;
  min-width:0;
  padding:10px 14px;
  border-radius:var(--radius-sm);
  border:1px solid var(--border);
  background:var(--surface-solid);
  color:var(--text);
  font-size:.85rem;
  font-family:'Inter',sans-serif;
  outline:none;
  transition:border var(--transition)
}
.form-row input:focus{border-color:var(--primary)}
.form-row input::placeholder{color:var(--text-dim)}
.form-row input[type="date"]{font-family:'JetBrains Mono',monospace;font-size:.8rem;min-width:145px;flex:0 0 auto}
.btn{
  padding:10px 18px;
  border-radius:var(--radius-sm);
  border:none;
  font-family:'Inter',sans-serif;
  font-weight:600;
  font-size:.82rem;
  cursor:pointer;
  transition:all var(--transition);
  display:inline-flex;
  align-items:center;
  gap:6px;
  white-space:nowrap
}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{filter:brightness(1.15);transform:translateY(-1px)}
.btn-ghost{
  background:transparent;
  color:var(--text-muted);
  border:1px solid var(--border)
}
.btn-ghost:hover{background:var(--surface-hover);color:var(--text)}
.btn-sm{padding:6px 12px;font-size:.78rem;border-radius:var(--radius-xs)}
.btn-danger{background:var(--primary-dim);color:var(--primary)}
.btn-danger:hover{background:var(--primary);color:#fff}
.tabs{
  display:flex;
  gap:4px;
  background:var(--surface-solid);
  border-radius:var(--radius-sm);
  padding:3px;
  border:1px solid var(--border)
}
.tab{
  flex:1;
  padding:9px 12px;
  border:none;
  border-radius:10px;
  background:transparent;
  color:var(--text-muted);
  font-family:'Inter',sans-serif;
  font-weight:500;
  font-size:.8rem;
  cursor:pointer;
  transition:all var(--transition)
}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.tab:hover:not(.active){color:var(--text)}
.event-list{display:flex;flex-direction:column;gap:10px;min-height:60px}
.event-card{
  background:var(--surface);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:14px 16px;
  transition:all var(--transition);
  position:relative;
  overflow:hidden
}
.event-card:hover{border-color:var(--primary-dim)}
.event-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:8px;
  margin-bottom:6px
}
.event-name{
  font-weight:600;
  font-size:.9rem;
  word-break:break-word;
  flex:1
}
.event-date{
  font-family:'JetBrains Mono',monospace;
  font-size:.72rem;
  color:var(--text-muted);
  white-space:nowrap
}
.event-countdown{
  font-family:'JetBrains Mono',monospace;
  font-size:1.25rem;
  font-weight:600;
  color:var(--primary);
  margin:4px 0 8px;
  line-height:1.2
}
.event-countdown.past{color:var(--text-dim)}
.event-countdown .label{
  font-size:.68rem;
  font-weight:400;
  color:var(--text-muted);
  font-family:'Inter',sans-serif
}
.progress-wrap{
  height:4px;
  background:var(--surface-solid);
  border-radius:99px;
  overflow:hidden;
  margin-bottom:8px
}
.progress-bar{
  height:100%;
  border-radius:99px;
  background:linear-gradient(90deg,var(--primary),var(--primary-soft));
  transition:width 0.6s var(--transition)
}
.progress-bar.past{background:var(--text-dim)}
.event-footer{
  display:flex;
  justify-content:space-between;
  align-items:center
}
.event-percent{
  font-family:'JetBrains Mono',monospace;
  font-size:.7rem;
  color:var(--text-muted)
}
.empty-state{
  text-align:center;
  padding:32px 16px;
  color:var(--text-dim);
  font-size:.85rem;
  line-height:1.6
}
.empty-state i{font-size:2rem;color:var(--primary-dim);margin-bottom:8px;display:block}
.toast{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%) translateY(100px);
  background:var(--surface-solid);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:12px 20px;
  color:var(--text);
  font-size:.82rem;
  font-weight:500;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
  z-index:999;
  opacity:0;
  transition:all 0.4s var(--transition);
  pointer-events:none;
  white-space:nowrap;
  max-width:90vw;
  overflow:hidden;
  text-overflow:ellipsis
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--green)}
.toast.error{border-color:var(--primary)}
footer{
  text-align:center;
  padding:20px 0 4px;
  font-size:.7rem;
  color:var(--text-dim);
  letter-spacing:0.5px
}
footer strong{color:var(--text-muted);font-weight:500}
@media(max-width:480px){
  body{padding:12px 10px}
  .wrapper{gap:10px}
  .card{padding:16px 14px}
  .form-row input[type="date"]{min-width:130px}
  .event-countdown{font-size:1.1rem}
}
</style>
</head>
<body>
<div class="wrapper">
  <button class="theme-btn" id="themeBtn" aria-label="Alternar tema">🌙</button>

  <div class="card">
    <div class="card-title"><span>➕</span> Nova Contagem</div>
    <div class="form-row">
      <input type="text" id="eventName" placeholder="Nome do evento" maxlength="80">
      <input type="date" id="eventDate">
      <button class="btn btn-primary" id="addBtn">Adicionar</button>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="active">Ativos</button>
    <button class="tab" data-tab="past">Passados</button>
  </div>

  <div class="card" style="flex:1">
    <div class="event-list" id="eventList"></div>
  </div>

  <footer>Dev <strong>Aleksandro Alves</strong></footer>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY='countdown_events';
const THEME_KEY='countdown_theme';
let events=[];
let activeTab='active';
let intervalId;

function loadEvents(){
  try{const d=localStorage.getItem(STORAGE_KEY);if(d)events=JSON.parse(d)}catch(e){}
  events=events.filter(e=>e&&e.name&&e.date)
}
function saveEvents(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(events));
  render()
}
function loadTheme(){
  const t=localStorage.getItem(THEME_KEY)||'dark';
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('themeBtn').textContent=t==='dark'?'☀️':'🌙'
}
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme');
  const next=cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem(THEME_KEY,next);
  document.getElementById('themeBtn').textContent=next==='dark'?'☀️':'🌙'
}

function toast(msg,type='success'){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='toast '+type;
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),2600)
}

function getRemaining(targetDate){
  const now=new Date().getTime();
  const target=new Date(targetDate+'T23:59:59').getTime();
  const diff=target-now;
  if(diff<=0)return{total:0,days:0,hours:0,minutes:0,seconds:0,past:true};
  return{
    total:diff,
    days:Math.floor(diff/86400000),
    hours:Math.floor((diff%86400000)/3600000),
    minutes:Math.floor((diff%3600000)/60000),
    seconds:Math.floor((diff%60000)/1000),
    past:false
  }
}

function getProgress(dateStr){
  const start=new Date(dateStr+'T00:00:00').getTime();
  const end=new Date(dateStr+'T23:59:59').getTime();
  const now=new Date().getTime();
  if(now>=end)return 100;
  const total=end-start;
  const elapsed=now-start;
  return Math.min(100,Math.max(0,(elapsed/total)*100))
}

function formatCountdown(r){
  if(r.past)return'Encerrado';
  const p=[];
  if(r.days>0)p.push(r.days+'d');
  if(r.hours>0||r.days>0)p.push(r.hours+'h');
  p.push(r.minutes+'min');
  p.push(r.seconds+'s');
  return p.join(' ')
}

function render(){
  const now=new Date();
  const sorted=[...events].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const active=sorted.filter(e=>new Date(e.date+'T23:59:59').getTime()>=now.getTime());
  const past=sorted.filter(e=>new Date(e.date+'T23:59:59').getTime()<now.getTime());
  const list=activeTab==='active'?active:past;
  const container=document.getElementById('eventList');

  if(list.length===0){
    container.innerHTML=`
      <div class="empty-state">
        <span style="font-size:2rem;display:block;margin-bottom:8px;opacity:0.4">📅</span>
        ${activeTab==='active'?'Nenhum evento ativo':'Nenhum evento passado'}
      </div>`;
    return;
  }

  container.innerHTML=list.map(e=>{
    const r=getRemaining(e.date);
    const pct=getProgress(e.date);
    const isPast=r.past;
    return`
      <div class="event-card">
        <div class="event-header">
          <div class="event-name">${escHtml(e.name)}</div>
          <button class="btn btn-sm btn-danger" onclick="removeEvent('${e._id}')" title="Remover">✕</button>
        </div>
        <div class="event-date">${formatDate(e.date)}</div>
        <div class="event-countdown${isPast?' past':''}">${isPast?'Encerrado':formatCountdown(r)}</div>
        <div class="progress-wrap"><div class="progress-bar${isPast?' past':''}" style="width:${pct}%"></div></div>
        <div class="event-footer">
          <span class="event-percent">${pct.toFixed(1)}% concluído</span>
        </div>
      </div>`
  }).join('')
}

function escHtml(s){
  const d=document.createElement('div');
  d.textContent=s;
  return d.innerHTML
}

function formatDate(s){
  const d=new Date(s+'T12:00:00');
  return d.toLocaleDateString('pt-BR')
}

function addEvent(){
  const nameInput=document.getElementById('eventName');
  const dateInput=document.getElementById('eventDate');
  const name=nameInput.value.trim();
  const date=dateInput.value;
  if(!name||!date){toast('Preencha nome e data','error');return}
  const today=new Date();today.setHours(0,0,0,0);
  if(new Date(date)<today){toast('A data deve ser hoje ou futura','error');return}
  events.push({_id:'e'+Date.now()+Math.random().toString(36).slice(2,6),name,date});
  saveEvents();
  nameInput.value='';
  toast('Evento adicionado!');
  activeTab='active';
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab==='active'))
}

function removeEvent(id){
  if(!confirm('Remover este evento?'))return;
  events=events.filter(e=>e._id!==id);
  saveEvents();
  toast('Evento removido')
}

document.getElementById('addBtn').addEventListener('click',addEvent);
document.getElementById('eventName').addEventListener('keydown',e=>{if(e.key==='Enter')addEvent()});
document.getElementById('eventDate').addEventListener('keydown',e=>{if(e.key==='Enter')addEvent()});
document.getElementById('themeBtn').addEventListener('click',toggleTheme);
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    activeTab=t.dataset.tab;
    render()
  })
});

loadTheme();
loadEvents();
render();
intervalId=setInterval(render,1000);
</script>
</body>
</html>
