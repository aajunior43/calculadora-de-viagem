<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baixar Vídeos Online</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, sans-serif;
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-hover: #334155;
      --primary: #ef4444;
      --primary-hover: #dc2626;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
      --success: #22c55e;
      --error: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #ef4444, #f97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p {
      color: var(--text-muted);
      font-size: 1.1rem;
    }
    .input-group {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }
    input[type="text"] {
      flex: 1;
      padding: 14px 18px;
      font-size: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      border-color: var(--primary);
    }
    input[type="text"]::placeholder {
      color: var(--text-muted);
    }
    button {
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status {
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 24px;
      display: none;
    }
    .status.show { display: block; }
    .status.info {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: #60a5fa;
    }
    .status.success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: var(--success);
    }
    .status.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--error);
    }
    .video-info {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      display: none;
    }
    .video-info.show { display: block; }
    .video-info .video-header {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }
    .video-info img {
      width: 200px;
      border-radius: 8px;
      object-fit: cover;
    }
    .video-info .video-details h3 {
      font-size: 1.1rem;
      margin-bottom: 8px;
    }
    .video-info .video-details p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .download-btn {
      width: 100%;
      padding: 16px;
      font-size: 1.1rem;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    .download-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(34, 197, 94, 0.3);
    }
    .download-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .examples {
      margin-top: 32px;
      padding: 20px;
      background: var(--surface);
      border-radius: 12px;
    }
    .examples h4 {
      color: var(--text-muted);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }
    .examples ul {
      list-style: none;
    }
    .examples li {
      padding: 8px 0;
      color: var(--text-muted);
      font-size: 0.9rem;
      border-bottom: 1px solid var(--border);
    }
    .examples li:last-child { border: none; }
    .examples code {
      color: var(--text);
      background: rgba(255,255,255,0.1);
      padding: 2px 6px;
      border-radius: 4px;
    }
    @media (max-width: 600px) {
      .input-group { flex-direction: column; }
      .video-info .video-header { flex-direction: column; }
      .video-info img { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Baixar Vídeos</h1>
      <p>Cole o link de qualquer vídeo e baixe em MP4</p>
    </div>

    <div class="input-group">
      <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." autofocus>
      <button class="btn-primary" id="fetchBtn" onclick="fetchInfo()">Buscar</button>
    </div>

    <div class="status" id="status"></div>

    <div class="video-info" id="videoInfo">
      <div class="video-header">
        <img id="thumbnail" src="" alt="Thumbnail">
        <div class="video-details">
          <h3 id="title"></h3>
          <p id="uploader"></p>
          <p id="duration"></p>
        </div>
      </div>
      <button class="download-btn" id="downloadBtn" onclick="downloadVideo()">
        Baixar MP4
      </button>
    </div>

    <div class="examples">
      <h4>Suporta</h4>
      <ul>
        <li>YouTube (vídeos e shorts)</li>
        <li>TikTok</li>
        <li>Twitter/X</li>
        <li>Instagram (reels e posts)</li>
        <li>E muito mais via yt-dlp</li>
      </ul>
    </div>
  </div>

  <script>
    const API_URL = `${window.location.protocol}//${window.location.hostname}:8767`;
    let currentUrl = '';

    function showStatus(msg, type = 'info') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = `status show ${type}`;
    }

    function hideStatus() {
      document.getElementById('status').className = 'status';
    }

    async function fetchInfo() {
      const url = document.getElementById('urlInput').value.trim();
      if (!url) return showStatus('Cole um link válido', 'error');

      currentUrl = url;
      const btn = document.getElementById('fetchBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Buscando...';
      hideStatus();
      document.getElementById('videoInfo').className = 'video-info';

      try {
        const res = await fetch(`${API_URL}/api/info`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Erro ao buscar vídeo');
        }

        const data = await res.json();
        document.getElementById('thumbnail').src = data.thumbnail;
        document.getElementById('title').textContent = data.title;
        document.getElementById('uploader').textContent = data.uploader;
        document.getElementById('duration').textContent = formatDuration(data.duration);
        document.getElementById('videoInfo').className = 'video-info show';
      } catch (err) {
        showStatus(err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Buscar';
      }
    }

    async function downloadVideo() {
      const btn = document.getElementById('downloadBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Baixando...';
      showStatus('Preparando download...', 'info');

      try {
        const res = await fetch(`${API_URL}/api/download`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: currentUrl, format: 'mp4' })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Erro ao baixar vídeo');
        }

        const blob = await res.blob();
        const disposition = res.headers.get('content-disposition');
        let filename = 'video.mp4';
        if (disposition) {
          const match = disposition.match(/filename="?([^"]+)"?/);
          if (match) filename = match[1];
        }

        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href);

        showStatus('Download concluído!', 'success');
      } catch (err) {
        showStatus(err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Baixar MP4';
      }
    }

    function formatDuration(s) {
      if (!s) return '';
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      if (h > 0) return `${h}h ${m}m ${sec}s`;
      return `${m}m ${sec}s`;
    }

    document.getElementById('urlInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') fetchInfo();
    });
  </script>
</body>
</html>
