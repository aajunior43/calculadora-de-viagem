<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Notes AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container { display: flex; flex-direction: column; height: 100vh; }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px; background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.2);
    }
    .header-left { display: flex; flex-direction: column; gap: 4px; }
    .header-actions { display: flex; gap: 10px; }
    h1 { font-size: 20px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 8px; }
    .subtitle { font-size: 11px; color: rgba(255,255,255,0.7); }
    .btn-icon {
      background: rgba(255,255,255,0.2); border: none; color: #fff;
      width: 36px; height: 36px; border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .btn-icon:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }
    .btn-primary { background: rgba(72,187,120,0.3) !important; border: 1px solid rgba(72,187,120,0.5); }
    .btn-primary:hover { background: rgba(72,187,120,0.4) !important; }
    .editor {
      flex: 1; padding: 20px; background: #fff; margin: 20px;
      border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    #noteArea {
      width: 100%; height: 100%; border: none; outline: none;
      font-size: 15px; line-height: 1.6; color: #2d3748; resize: none; font-family: inherit;
    }
    #noteArea::placeholder { color: #a0aec0; }
    footer {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.2);
      font-size: 13px; color: #fff; flex-wrap: wrap; gap: 12px;
    }
    .footer-info { display: flex; gap: 16px; }
    .char-count, .word-count { opacity: 0.8; font-size: 12px; }
    .api-key-section { display: flex; gap: 8px; align-items: center; }
    #apiKeyInput {
      padding: 8px 12px; border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1); color: #fff; border-radius: 6px;
      font-size: 13px; outline: none; width: 250px;
    }
    #apiKeyInput::placeholder { color: rgba(255,255,255,0.6); }
    #apiKeyInput:focus { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.5); }
    .btn-save-key {
      padding: 8px 16px; background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3); color: #fff; border-radius: 6px;
      font-size: 13px; cursor: pointer; font-weight: 500;
    }
    .btn-save-key:hover { background: rgba(255,255,255,0.3); }
    .btn-icon:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-icon.loading { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-message {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(0,0,0,0.85); color: #fff; padding: 12px 20px;
      border-radius: 8px; font-size: 13px; opacity: 0; transition: all 0.3s;
      pointer-events: none; z-index: 1000;
    }
    .status-message.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .status-message.success { background: rgba(72,187,120,0.95); }
    .status-message.error { background: rgba(245,101,101,0.95); }
    .status-message.info { background: rgba(66,153,225,0.95); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <h1>📝 Quick Notes AI</h1>
        <span class="subtitle">Nomes inteligentes com IA</span>
      </div>
      <div class="header-actions">
        <button id="clearBtn" class="btn-icon" title="Limpar notas">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        </button>
        <button id="downloadBtn" class="btn-icon btn-primary" title="Baixar com IA">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        </button>
      </div>
    </header>
    <div class="editor">
      <textarea id="noteArea" placeholder="Escreva suas notas aqui... A IA criará um nome ao baixar!" spellcheck="false"></textarea>
    </div>
    <footer>
      <div class="footer-info">
        <div class="char-count" id="charCount">0 caracteres</div>
        <div class="word-count" id="wordCount">0 palavras</div>
      </div>
      <div class="api-key-section">
        <input type="password" id="apiKeyInput" placeholder="API Key do Gemini" autocomplete="off"/>
        <button id="saveKeyBtn" class="btn-save-key"><span id="saveKeyText">Salvar</span></button>
      </div>
    </footer>
    <div id="statusMessage" class="status-message"></div>
  </div>
  <script>
    const noteArea = document.getElementById('noteArea');
    const charCount = document.getElementById('charCount');
    const wordCount = document.getElementById('wordCount');
    const downloadBtn = document.getElementById('downloadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const saveKeyBtn = document.getElementById('saveKeyBtn');
    const saveKeyText = document.getElementById('saveKeyText');
    const statusMessage = document.getElementById('statusMessage');
    let apiKey = localStorage.getItem('geminiApiKey') || '';

    document.addEventListener('DOMContentLoaded', () => {
      if (apiKey) { apiKeyInput.value = '•'.repeat(20); apiKeyInput.type = 'password'; saveKeyText.textContent = 'Limpar'; }
      updateCounts();
    });

    function showStatus(message, type = 'info') {
      statusMessage.textContent = message;
      statusMessage.className = `status-message show ${type}`;
      setTimeout(() => statusMessage.classList.remove('show'), 3000);
    }

    function updateCounts() {
      const text = noteArea.value;
      const cl = text.length;
      const wl = text.trim() ? text.trim().split(/\s+/).length : 0;
      charCount.textContent = `${cl.toLocaleString('pt-BR')} caractere${cl !== 1 ? 's' : ''}`;
      wordCount.textContent = `${wl.toLocaleString('pt-BR')} palavra${wl !== 1 ? 's' : ''}`;
    }

    noteArea.addEventListener('input', updateCounts);

    clearBtn.addEventListener('click', () => {
      if (noteArea.value.trim() && confirm('Limpar todas as notas?')) {
        noteArea.value = ''; updateCounts(); showStatus('Notas limpas!', 'success');
      }
    });

    saveKeyBtn.addEventListener('click', () => {
      if (apiKey) {
        if (confirm('Remover API Key?')) {
          localStorage.removeItem('geminiApiKey'); apiKey = ''; apiKeyInput.value = '';
          apiKeyInput.type = 'password'; saveKeyText.textContent = 'Salvar';
          showStatus('API Key removida!', 'success');
        }
      } else {
        const k = apiKeyInput.value.trim();
        if (k && k.length >= 30) {
          localStorage.setItem('geminiApiKey', k); apiKey = k;
          apiKeyInput.value = '•'.repeat(20); apiKeyInput.type = 'password';
          saveKeyText.textContent = 'Limpar'; showStatus('API Key salva!', 'success');
        } else showStatus('API Key inválida!', 'error');
      }
    });

    async function generateFilenameWithAI(text) {
      if (!apiKey) throw new Error('API Key não configurada');
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: `Crie um nome de arquivo curto (max 40 chars), descritivo, sem espaços. Responda APENAS o nome.\n\nTEXTO:\n${text.substring(0, 800)}` }] }],
          generationConfig: { temperature: 0.4, maxOutputTokens: 60 }
        })
      });
      if (!res.ok) throw new Error('Erro API Gemini');
      const data = await res.json();
      const name = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || 'nota';
      return name.replace(/[^a-zA-Z0-9\-_àáâãèéêìíòóôõùúçÀ-ÿ]/g, '-').replace(/-+/g, '-').substring(0, 40);
    }

    downloadBtn.addEventListener('click', async () => {
      const notes = noteArea.value.trim();
      if (!notes) return showStatus('Sem notas para baixar!', 'error');
      if (!apiKey) { showStatus('Configure sua API Key!', 'error'); apiKeyInput.focus(); return; }
      try {
        downloadBtn.disabled = true; downloadBtn.classList.add('loading');
        showStatus('Gerando nome com IA...', 'info');
        const name = await generateFilenameWithAI(notes);
        const blob = new Blob([notes], { type: 'text/plain;charset=utf-8' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `${name}.txt`; a.click(); URL.revokeObjectURL(a.href);
        showStatus(`Baixado: ${name}.txt`, 'success');
      } catch (e) { showStatus('Erro ao gerar nome.', 'error'); }
      finally { downloadBtn.disabled = false; downloadBtn.classList.remove('loading'); }
    });

    noteArea.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'd') { e.preventDefault(); downloadBtn.click(); }
      if ((e.ctrlKey || e.metaKey) && e.key === 'l') { e.preventDefault(); clearBtn.click(); }
    });
    noteArea.focus();
  </script>
</body>
</html>
