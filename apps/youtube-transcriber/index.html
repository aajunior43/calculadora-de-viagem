<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Transcriber</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #e11d48;
  --primary-hover: #be123c;
  --green: #10b981;
  --blue: #3b82f6;
  --bg: #0a0a0f;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.08);
  --text: #f1f1f6;
  --text-secondary: #9ca3af;
  --radius: 20px;
  --font: 'Inter', system-ui, -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
}

[data-theme="light"] {
  --bg: #f8f9fc;
  --surface: rgba(0,0,0,0.03);
  --surface-hover: rgba(0,0,0,0.06);
  --border: rgba(0,0,0,0.08);
  --text: #1a1a2e;
  --text-secondary: #6b7280;
  --primary: #be123c;
  --primary-hover: #e11d48;
  --shadow: 0 8px 32px rgba(0,0,0,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background .3s, color .3s;
  line-height: 1.6;
}

.theme-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 100;
  width: 44px;
  height: 44px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--surface);
  backdrop-filter: blur(20px);
  color: var(--text);
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
}
.theme-toggle:hover { background: var(--surface-hover); }

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 32px 20px 80px;
}

.header {
  text-align: center;
  margin-bottom: 32px;
}
.header h1 {
  font-size: 1.75rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--primary), var(--blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header p {
  color: var(--text-secondary);
  font-size: 0.9rem;
  margin-top: 4px;
}

.input-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  backdrop-filter: blur(20px);
  margin-bottom: 20px;
}
.input-group {
  display: flex;
  gap: 10px;
}
.input-group input {
  flex: 1;
  padding: 14px 18px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  color: var(--text);
  font-family: var(--font);
  font-size: 0.95rem;
  transition: border-color .2s;
}
.input-group input:focus {
  outline: none;
  border-color: var(--primary);
}
.input-group input::placeholder {
  color: var(--text-secondary);
  opacity: .6;
}

.btn {
  padding: 14px 24px;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  font-family: var(--font);
  font-size: 0.95rem;
  font-weight: 600;
  transition: all .2s;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn:disabled {
  opacity: .5;
  cursor: not-allowed;
}
.btn-primary {
  background: var(--primary);
  color: #fff;
}
.btn-primary:hover:not(:disabled) {
  background: var(--primary-hover);
  transform: translateY(-1px);
}
.btn-secondary {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover:not(:disabled) {
  background: var(--surface-hover);
  border-color: var(--primary);
}
.btn-sm {
  padding: 8px 14px;
  font-size: 0.85rem;
  border-radius: 10px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  backdrop-filter: blur(20px);
  overflow: hidden;
  margin-bottom: 20px;
  display: none;
}
.card.active { display: block; }

.video-header {
  display: flex;
  gap: 16px;
  padding: 20px;
  align-items: flex-start;
}
.video-thumb {
  width: 160px;
  min-width: 160px;
  border-radius: 12px;
  aspect-ratio: 16/9;
  object-fit: cover;
  background: var(--bg);
}
.video-meta { min-width: 0; }
.video-meta h2 {
  font-size: 1rem;
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.video-meta .channel {
  font-size: 0.85rem;
  color: var(--text-secondary);
}
.video-meta .views {
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-top: 2px;
}

.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  gap: 0;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.tab {
  flex: 1;
  padding: 14px 16px;
  text-align: center;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .2s;
  white-space: nowrap;
  background: none;
  font-family: var(--font);
}
.tab:hover { color: var(--text); }
.tab.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
}

.tab-content { display: none; padding: 20px; }
.tab-content.active { display: block; }

.lang-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 16px;
}
.lang-bar label {
  font-size: 0.85rem;
  color: var(--text-secondary);
  font-weight: 500;
}
.lang-bar select {
  padding: 8px 14px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--font);
  font-size: 0.85rem;
  cursor: pointer;
  transition: border-color .2s;
}
.lang-bar select:focus { outline: none; border-color: var(--primary); }

.action-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.transcript-list {
  max-height: 520px;
  overflow-y: auto;
  scroll-behavior: smooth;
}
.transcript-list::-webkit-scrollbar {
  width: 6px;
}
.transcript-list::-webkit-scrollbar-track {
  background: transparent;
}
.transcript-list::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}

.line {
  padding: 8px 12px;
  border-radius: 10px;
  margin-bottom: 3px;
  cursor: pointer;
  transition: background .15s;
  font-size: 0.95rem;
  display: flex;
  gap: 10px;
  align-items: baseline;
}
.line:hover { background: var(--surface-hover); }
.line .time {
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--primary);
  font-weight: 600;
  white-space: nowrap;
  min-width: 58px;
  text-align: right;
}
.line .text { flex: 1; }

.line mark {
  background: rgba(225, 29, 72, 0.3);
  color: inherit;
  border-radius: 3px;
  padding: 0 2px;
}

.search-box {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.search-box input {
  flex: 1;
  padding: 10px 14px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--font);
  font-size: 0.9rem;
  transition: border-color .2s;
}
.search-box input:focus { outline: none; border-color: var(--primary); }
.search-count {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-bottom: 12px;
}

.info-grid {
  display: grid;
  gap: 12px;
}
.info-item {
  display: flex;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--bg);
  border-radius: 12px;
  font-size: 0.9rem;
}
.info-item .label { color: var(--text-secondary); font-weight: 500; }
.info-item .value { font-weight: 600; text-align: right; max-width: 60%; word-break: break-all; }
.info-item .value a { color: var(--blue); text-decoration: none; }
.info-item .value a:hover { text-decoration: underline; }

.spinner {
  display: inline-block;
  width: 22px;
  height: 22px;
  border: 2.5px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-secondary);
}
.loading-state .spinner { width: 36px; height: 36px; border-width: 3px; margin-bottom: 12px; }
.loading-state p { font-size: 0.95rem; }

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-secondary);
}
.empty-state .icon { font-size: 2.5rem; margin-bottom: 8px; }
.empty-state h3 { font-size: 1rem; margin-bottom: 4px; color: var(--text); }
.empty-state p { font-size: 0.9rem; }

.error-box {
  background: rgba(225,29,72,0.1);
  border: 1px solid rgba(225,29,72,0.3);
  border-radius: 14px;
  padding: 14px 18px;
  color: var(--primary);
  font-size: 0.9rem;
  margin-bottom: 16px;
  display: none;
}
.error-box.active { display: block; }

.toast-container {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
  pointer-events: none;
}
.toast {
  background: var(--surface);
  border: 1px solid var(--border);
  backdrop-filter: blur(24px);
  border-radius: 14px;
  padding: 12px 20px;
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text);
  box-shadow: var(--shadow);
  animation: toastIn .3s ease;
  pointer-events: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}
.toast.out { animation: toastOut .25s ease forwards; }
@keyframes toastIn {
  from { opacity:0; transform:translateY(12px) scale(.95); }
  to { opacity:1; transform:translateY(0) scale(1); }
}
@keyframes toastOut {
  from { opacity:1; transform:translateY(0) scale(1); }
  to { opacity:0; transform:translateY(12px) scale(.95); }
}

.footer {
  text-align: center;
  padding: 32px 20px;
  color: var(--text-secondary);
  font-size: 0.85rem;
}
.footer strong { color: var(--text); }

@media (max-width: 560px) {
  .container { padding: 20px 16px 60px; }
  .header h1 { font-size: 1.35rem; }
  .input-group { flex-direction: column; }
  .input-group .btn { justify-content: center; }
  .video-header { flex-direction: column; }
  .video-thumb { width: 100%; min-width: auto; aspect-ratio: 16/9; }
  .tabs { gap: 0; }
  .tab { font-size: 0.8rem; padding: 12px 10px; }
  .tab-content { padding: 16px; }
  .action-bar .btn { flex: 1; justify-content: center; }
  .line { font-size: 0.88rem; padding: 7px 10px; }
  .line .time { min-width: 50px; font-size: 0.75rem; }
  .theme-toggle { top: 12px; right: 12px; width: 40px; height: 40px; }
}
</style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">🌙</button>

<div class="container">
  <div class="header">
    <h1>YouTube Transcriber</h1>
    <p>Extraia transcrições de vídeos do YouTube instantaneamente</p>
  </div>

  <div class="input-card">
    <div class="input-group">
      <input type="text" id="urlInput" placeholder="Cole a URL do YouTube… (youtube.com, youtu.be)" autocomplete="off" />
      <button class="btn btn-primary" id="btnFetch" onclick="handleFetch()">Transcrever</button>
    </div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="card" id="videoCard">
    <div class="video-header">
      <img class="video-thumb" id="videoThumb" src="" alt="" />
      <div class="video-meta">
        <h2 id="videoTitle"></h2>
        <div class="channel" id="videoChannel"></div>
        <div class="views" id="videoViews"></div>
      </div>
    </div>
  </div>

  <div class="card" id="resultCard">
    <div class="tabs" id="tabs">
      <button class="tab active" data-tab="transcript">Transcrição</button>
      <button class="tab" data-tab="search">Buscar</button>
      <button class="tab" data-tab="info">Info</button>
    </div>

    <div class="tab-content active" id="tabTranscript">
      <div class="lang-bar" id="langBar">
        <label>Idioma:</label>
        <select id="langSelect"></select>
      </div>
      <div class="action-bar">
        <button class="btn btn-secondary btn-sm" onclick="doCopyAll()">Copiar</button>
        <button class="btn btn-secondary btn-sm" onclick="doDownloadTxt()">Download TXT</button>
      </div>
      <div class="transcript-list" id="transcriptList"></div>
    </div>

    <div class="tab-content" id="tabSearch">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar na transcrição…" autocomplete="off" />
        <button class="btn btn-secondary btn-sm" onclick="doSearch()">Buscar</button>
      </div>
      <div class="search-count" id="searchCount"></div>
      <div class="transcript-list" id="searchResults"></div>
    </div>

    <div class="tab-content" id="tabInfo">
      <div class="info-grid" id="infoGrid"></div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<div class="footer">
  Dev <strong>Aleksandro Alves</strong>
</div>

<script>
const API_BASE = 'https://youtubetranscript.com/api_v2';
let state = {
  videoId: '',
  segments: [],
  lang: 'en',
  availableLangs: []
};

const $ = id => document.getElementById(id);

function toast(msg, icon = '') {
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = icon ? `<span>${icon}</span> ${escapeHtml(msg)}` : escapeHtml(msg);
  $('toastContainer').appendChild(el);
  setTimeout(() => { el.classList.add('out'); setTimeout(() => el.remove(), 260); }, 2200);
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function extractVideoId(url) {
  const patterns = [
    /(?:youtube\.com\/watch\?v=)([\w-]{11})/,
    /(?:youtu\.be\/)([\w-]{11})/,
    /(?:youtube\.com\/embed\/)([\w-]{11})/,
    /(?:youtube\.com\/v\/)([\w-]{11})/,
    /(?:youtube\.com\/shorts\/)([\w-]{11})/
  ];
  for (const p of patterns) {
    const m = url.match(p);
    if (m) return m[1];
  }
  return null;
}

function fmtTime(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = Math.floor(sec % 60);
  return h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${m}:${String(s).padStart(2,'0')}`;
}

function showError(msg) {
  const e = $('errorBox');
  e.textContent = msg;
  e.classList.add('active');
}

function hideError() {
  $('errorBox').classList.remove('active');
}

async function handleFetch() {
  hideError();
  const url = $('urlInput').value.trim();
  if (!url) { showError('Insira uma URL do YouTube.'); return; }
  const id = extractVideoId(url);
  if (!id) { showError('URL inválida. Use youtube.com/watch?v=…, youtu.be/… ou youtube.com/embed/…'); return; }

  state.videoId = id;
  state.segments = [];
  state.availableLangs = [];

  const btn = $('btnFetch');
  btn.disabled = true;
  btn.textContent = 'Buscando…';

  showLoading();
  hideError();

  $('videoCard').classList.remove('active');
  $('resultCard').classList.remove('active');

  try {
    const [oembedRes, transcriptRes] = await Promise.all([
      fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`),
      fetch(`${API_BASE}?video_id=${id}`)
    ]);

    if (oembedRes.ok) {
      const info = await oembedRes.json();
      $('videoTitle').textContent = info.title || 'Sem título';
      $('videoChannel').textContent = info.author_name || '';
      $('videoThumb').src = `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
      $('videoThumb').alt = info.title || '';
      $('videoCard').classList.add('active');
    } else {
      $('videoThumb').src = `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
      $('videoCard').classList.add('active');
      $('videoTitle').textContent = 'Vídeo do YouTube';
    }

    if (transcriptRes.ok) {
      const data = await transcriptRes.json();
      if (data && Array.isArray(data) && data.length > 0) {
        state.segments = data;
        state.availableLangs = [];
        $('resultCard').classList.add('active');
        populateLangSelect();
        renderTranscript();
      } else if (data && data.captions && Array.isArray(data.captions)) {
        state.segments = data.captions;
        state.availableLangs = data.translationLanguages || [];
        $('resultCard').classList.add('active');
        populateLangSelect();
        renderTranscript();
      } else {
        showError('Nenhuma transcrição disponível para este vídeo.');
        showEmpty('Transcrição não encontrada', 'Este vídeo pode não ter legendas/CC disponíveis.');
      }
    } else {
      showError('Erro ao buscar transcrição. Verifique se o vídeo existe e possui legendas.');
      showEmpty('Transcrição não encontrada', 'Tente outro vídeo com legendas ativadas.');
    }
  } catch (e) {
    showError('Erro de conexão. Verifique sua internet e tente novamente.');
    showEmpty('Erro de conexão', 'Não foi possível contactar o servidor.');
  }

  btn.disabled = false;
  btn.textContent = 'Transcrever';
}

function populateLangSelect() {
  const sel = $('langSelect');
  sel.innerHTML = '';
  if (state.availableLangs.length > 0) {
    state.availableLangs.forEach(l => {
      const o = document.createElement('option');
      o.value = l.languageCode || l;
      o.textContent = l.language || l.languageCode || l;
      if (o.value === state.lang) o.selected = true;
      sel.appendChild(o);
    });
  } else {
    const o = document.createElement('option');
    o.value = 'en';
    o.textContent = 'Inglês (padrão)';
    sel.appendChild(o);
  }
}

async function changeLang() {
  const lang = $('langSelect').value;
  state.lang = lang;

  if (state.availableLangs.length > 0) {
    try {
      const res = await fetch(`${API_BASE}?video_id=${state.videoId}&lang=${lang}`);
      if (res.ok) {
        const data = await res.json();
        if (Array.isArray(data)) {
          state.segments = data;
        } else if (data.captions) {
          state.segments = data.captions;
        }
        renderTranscript();
        return;
      }
    } catch (e) {}
  }

  toast('Transcrição carregada', '✓');
}

function renderTranscript(filterText) {
  const list = $('transcriptList');
  const segs = state.segments;

  if (!segs || segs.length === 0) {
    $('resultCard').classList.remove('active');
    return;
  }

  let html = '';
  const q = filterText ? filterText.trim().toLowerCase() : '';

  segs.forEach((s, i) => {
    const text = s.text || '';
    const start = s.start || 0;
    const time = fmtTime(start);
    let displayText = escapeHtml(text);

    if (q && text.toLowerCase().includes(q)) {
      const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      displayText = escapeHtml(text).replace(re, '<mark>$1</mark>');
    }

    html += `<div class="line" onclick="jumpTo(${start})">
      <span class="time">${time}</span>
      <span class="text">${displayText}</span>
    </div>`;
  });

  list.innerHTML = html;
}

function jumpTo(sec) {
  const url = `https://www.youtube.com/watch?v=${state.videoId}&t=${Math.floor(sec)}`;
  window.open(url, '_blank');
}

function doCopyAll() {
  if (!state.segments.length) return;
  const text = state.segments.map(s => `[${fmtTime(s.start || 0)}] ${s.text}`).join('\n');
  navigator.clipboard.writeText(text).then(() => toast('Transcrição copiada!', '📋')).catch(() => toast('Erro ao copiar', '✗'));
}

function doDownloadTxt() {
  if (!state.segments.length) return;
  const text = state.segments.map(s => `[${fmtTime(s.start || 0)}] ${s.text}`).join('\n');
  download(`transcript-${state.videoId}.txt`, text, 'text/plain');
  toast('Download iniciado!', '⬇');
}

function download(name, content, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  a.click();
  URL.revokeObjectURL(url);
}

function doSearch() {
  const q = $('searchInput').value;
  const list = $('searchResults');
  const count = $('searchCount');

  if (!q.trim() || !state.segments.length) {
    list.innerHTML = '';
    count.textContent = '';
    renderTranscript();
    return;
  }

  const lower = q.trim().toLowerCase();
  const matches = state.segments.filter(s => (s.text || '').toLowerCase().includes(lower));

  count.textContent = `${matches.length} resultado${matches.length !== 1 ? 's' : ''}`;

  let html = '';
  matches.forEach(s => {
    const text = s.text || '';
    const re = new RegExp(`(${lower.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    const display = escapeHtml(text).replace(re, '<mark>$1</mark>');
    html += `<div class="line" onclick="jumpTo(${s.start || 0})">
      <span class="time">${fmtTime(s.start || 0)}</span>
      <span class="text">${display}</span>
    </div>`;
  });

  if (!html) {
    html = '<div class="empty-state"><div class="icon">🔍</div><p>Nenhum resultado encontrado</p></div>';
  }

  list.innerHTML = html;
}

function buildInfo() {
  const el = $('infoGrid');
  const items = [
    { label: 'ID do Vídeo', value: state.videoId },
    { label: 'Total de linhas', value: String(state.segments.length) },
    { label: 'Idioma', value: state.lang || '—' },
    { label: 'URL do Vídeo', value: `<a href="https://www.youtube.com/watch?v=${state.videoId}" target="_blank">youtube.com/watch?v=${state.videoId}</a>` }
  ];

  if (state.availableLangs.length > 0) {
    items.splice(3, 0, { label: 'Idiomas disponíveis', value: state.availableLangs.map(l => l.language || l.languageCode).join(', ') || String(state.availableLangs.length) });
  }

  el.innerHTML = items.map(i => `
    <div class="info-item">
      <span class="label">${i.label}</span>
      <span class="value">${i.value}</span>
    </div>
  `).join('');
}

function showLoading() {
  const list = $('transcriptList');
  list.innerHTML = `<div class="loading-state"><div class="spinner"></div><p>Buscando transcrição…</p></div>`;
  $('searchResults').innerHTML = '';
  $('searchCount').textContent = '';
  $('langBar').style.display = 'none';
}

function showEmpty(title, msg) {
  const list = $('transcriptList');
  list.innerHTML = `<div class="empty-state"><div class="icon">🎬</div><h3>${escapeHtml(title)}</h3><p>${escapeHtml(msg)}</p></div>`;
}

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    $(`tab${tab.dataset.tab.charAt(0).toUpperCase() + tab.dataset.tab.slice(1)}`).classList.add('active');
    if (tab.dataset.tab === 'info') buildInfo();
    if (tab.dataset.tab === 'search') $('searchInput').focus();
  });
});

// Theme
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('yt-transcriber-theme', t);
  $('themeToggle').textContent = t === 'dark' ? '🌙' : '☀️';
}

const saved = localStorage.getItem('yt-transcriber-theme');
if (saved) setTheme(saved);

$('themeToggle').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme');
  setTheme(cur === 'dark' ? 'light' : 'dark');
});

// Enter key
$('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleFetch();
});

// Lang change
$('langSelect').addEventListener('change', changeLang);

// Search on input
let searchTimer;
$('searchInput').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(doSearch, 300);
});

// Init
$('langBar').style.display = 'none';
$('transcriptList').innerHTML = `<div class="empty-state"><div class="icon">🎬</div><h3>YouTube Transcriber</h3><p>Cole uma URL do YouTube e clique em <strong>Transcrever</strong> para começar.</p></div>`;
</script>
</body>
</html>
