<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Conte caracteres, palavras, frases e tempo de leitura. Limite de texto em tempo real.">
  <meta name="theme-color" content="#080c18">
  <title>Contador de Caracteres</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="dark"] {
      color-scheme: dark;
      --bg: #080c18;
      --bg-grad-1: #0d1225;
      --surface: rgba(16, 23, 40, 0.75);
      --surface-solid: #121a2e;
      --surface-hover: #1a2540;
      --surface-border: rgba(99, 140, 255, 0.06);
      --primary: #a78bfa;
      --primary-soft: #8b5cf6;
      --primary-dim: rgba(167, 139, 250, 0.1);
      --primary-glow: rgba(167, 139, 250, 0.25);
      --text: #eef2ff;
      --text-soft: #c7d2fe;
      --text-muted: #8892b0;
      --text-dim: #6b7280;
      --border: rgba(99, 140, 255, 0.08);
      --border-solid: #1e293b;
      --green: #34d399;
      --green-dim: rgba(52, 211, 153, 0.1);
      --yellow: #fbbf24;
      --yellow-dim: rgba(251, 191, 36, 0.1);
      --red: #f87171;
      --red-dim: rgba(248, 113, 113, 0.1);
      --blue: #60a5fa;
      --blue-dim: rgba(96, 165, 250, 0.1);
      --radius: 24px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --radius-xs: 8px;
      --shadow-card: 0 4px 24px rgba(0,0,0,0.4), 0 0 0 1px var(--border);
      --shadow-glow: 0 0 40px rgba(167, 139, 250, 0.05);
      --transition: cubic-bezier(0.22, 1, 0.36, 1);
    }

    [data-theme="light"] {
      color-scheme: light;
      --bg: #f0f3fa;
      --bg-grad-1: #e8ecf6;
      --surface: rgba(255, 255, 255, 0.85);
      --surface-solid: #ffffff;
      --surface-hover: #f8f9fd;
      --surface-border: rgba(0, 0, 0, 0.04);
      --primary: #7c3aed;
      --primary-soft: #6d28d9;
      --primary-dim: rgba(124, 58, 237, 0.08);
      --primary-glow: rgba(124, 58, 237, 0.15);
      --text: #0f172a;
      --text-soft: #334155;
      --text-muted: #64748b;
      --text-dim: #94a3b8;
      --border: rgba(0, 0, 0, 0.06);
      --border-solid: #e2e8f0;
      --green: #16a34a;
      --green-dim: rgba(22, 163, 74, 0.08);
      --yellow: #d97706;
      --yellow-dim: rgba(217, 119, 6, 0.08);
      --red: #dc2626;
      --red-dim: rgba(220, 38, 38, 0.08);
      --blue: #2563eb;
      --blue-dim: rgba(37, 99, 235, 0.08);
      --shadow-card: 0 2px 12px rgba(0,0,0,0.06), 0 0 0 1px var(--border);
      --shadow-glow: 0 0 40px rgba(124, 58, 237, 0.03);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 800px 500px at 10% -10%, var(--primary-dim), transparent),
        radial-gradient(ellipse 600px 600px at 90% 110%, rgba(96, 165, 250, 0.06), transparent);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
      transition: background 0.5s var(--transition);
    }

    .wrapper {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Theme Toggle ── */
    .theme-toggle {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 100;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      backdrop-filter: blur(16px);
      color: var(--text);
      font-size: 1rem;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: all 0.35s var(--transition);
      box-shadow: var(--shadow-card);
    }
    .theme-toggle:hover { transform: scale(1.08) rotate(15deg); border-color: var(--primary); }
    .theme-toggle:active { transform: scale(0.92); }

    /* ── Card ── */
    .card {
      background: var(--surface);
      backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius);
      padding: 32px 24px;
      box-shadow: var(--shadow-card), var(--shadow-glow);
      animation: cardEnter 0.7s var(--transition);
    }
    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(24px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 24px; }
    .icon-wrap {
      width: 64px;
      height: 64px;
      margin: 0 auto 14px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-dim), var(--blue-dim));
      border: 1px solid var(--primary-glow);
      display: grid;
      place-items: center;
      font-size: 1.6rem;
      position: relative;
    }
    .icon-wrap::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1px solid var(--primary-dim);
      animation: ripple 3s ease-in-out infinite;
    }
    @keyframes ripple {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.15); opacity: 0; }
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      margin-bottom: 4px;
      background: linear-gradient(135deg, var(--primary) 20%, var(--blue) 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      color: var(--text-muted);
      font-size: 0.82rem;
      font-weight: 500;
    }

    /* ── Input ── */
    .textarea-wrap {
      position: relative;
      margin-bottom: 6px;
    }
    .textarea-wrap textarea {
      width: 100%;
      min-height: 180px;
      padding: 16px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 500;
      line-height: 1.6;
      background: var(--bg-grad-1);
      border: 1.5px solid var(--border-solid);
      border-radius: var(--radius-sm);
      color: var(--text);
      outline: none;
      resize: vertical;
      transition: all 0.3s var(--transition);
    }
    .textarea-wrap textarea::placeholder { color: var(--text-dim); }
    .textarea-wrap textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-dim);
    }

    .char-counter {
      position: absolute;
      bottom: 12px;
      right: 12px;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      pointer-events: none;
      transition: all 0.3s ease;
    }
    .char-counter.warn { color: var(--yellow); border-color: var(--yellow); background: var(--yellow-dim); }
    .char-counter.over { color: var(--red); border-color: var(--red); background: var(--red-dim); }

    /* ── Limit Input ── */
    .limit-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .limit-input {
      flex: 1;
      height: 40px;
      padding: 0 12px;
      font-size: 0.82rem;
      font-weight: 600;
      font-family: inherit;
      background: var(--bg-grad-1);
      border: 1.5px solid var(--border-solid);
      border-radius: var(--radius-xs);
      color: var(--text);
      outline: none;
      transition: all 0.3s var(--transition);
      -moz-appearance: textfield;
    }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .limit-input::placeholder { color: var(--text-dim); font-weight: 500; }
    .limit-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-dim); }

    .limit-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ── Presets ── */
    .presets { margin-bottom: 16px; }
    .presets-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .presets-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .preset-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      border-radius: 20px;
      border: 1.5px solid var(--border-solid);
      background: var(--bg-grad-1);
      color: var(--text-muted);
      font-size: 0.7rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.25s var(--transition);
      white-space: nowrap;
    }
    .preset-btn:hover {
      border-color: var(--primary);
      background: var(--primary-dim);
      color: var(--text);
      transform: translateY(-1px);
    }
    .preset-btn:active { transform: scale(0.95); }
    .preset-btn.active {
      border-color: var(--primary);
      background: var(--primary-dim);
      color: var(--primary);
      box-shadow: 0 0 12px var(--primary-glow);
    }
    .preset-icon { font-size: 0.85rem; }
    .preset-name { font-weight: 700; }
    .preset-limit {
      font-size: 0.6rem;
      padding: 1px 5px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      color: var(--text-dim);
    }
    .preset-btn.active .preset-limit {
      background: rgba(167,139,250,0.2);
      color: var(--primary);
    }

    /* ── Progress Bar ── */
    .progress-wrap {
      height: 4px;
      border-radius: 2px;
      background: var(--border-solid);
      margin-bottom: 20px;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .progress-wrap.show { opacity: 1; }
    .progress-bar {
      height: 100%;
      border-radius: 2px;
      background: var(--primary);
      transition: width 0.4s var(--transition), background 0.3s ease;
    }
    .progress-bar.warn { background: var(--yellow); }
    .progress-bar.over { background: var(--red); }

    /* ── Stats Grid ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .stat {
      background: var(--bg-grad-1);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 10px;
      text-align: center;
      transition: all 0.3s var(--transition);
    }
    .stat:hover { border-color: var(--primary); transform: translateY(-2px); }
    .stat-icon { font-size: 1.1rem; margin-bottom: 4px; }
    .stat-val {
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--text);
      line-height: 1.1;
    }
    .stat-label {
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 2px;
    }

    /* ── Secondary Stats ── */
    .stats-secondary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 16px;
    }
    .stat-s {
      background: var(--bg-grad-1);
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      padding: 10px 6px;
      text-align: center;
    }
    .stat-s .stat-val { font-size: 1.1rem; }
    .stat-s .stat-label { font-size: 0.6rem; }

    /* ── Reading Time ── */
    .reading-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--bg-grad-1);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
    }
    .reading-bar .rb-icon { font-size: 1.2rem; }
    .reading-bar .rb-text {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
    }
    .reading-bar .rb-text strong { color: var(--text); font-weight: 800; }

    /* ── Actions ── */
    .actions {
      display: flex;
      gap: 8px;
    }
    .actions button {
      flex: 1;
      height: 42px;
      border-radius: var(--radius-xs);
      border: 1.5px solid var(--border-solid);
      background: var(--bg-grad-1);
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.25s var(--transition);
    }
    .actions button:hover { border-color: var(--primary); background: var(--primary-dim); transform: translateY(-1px); }
    .actions button:active { transform: scale(0.96); }

    /* ── Footer ── */
    .card-footer {
      text-align: center;
      padding-top: 14px;
      margin-top: 14px;
      border-top: 1px solid var(--border);
    }
    .card-footer span {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-dim);
      opacity: 0.5;
      transition: opacity 0.3s ease;
    }
    .card-footer span:hover { opacity: 0.8; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      padding: 10px 22px;
      background: var(--surface-solid);
      border: 1px solid var(--border-solid);
      border-radius: 30px;
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 700;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      opacity: 0;
      pointer-events: none;
      transition: all 0.4s var(--transition);
      z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Keyboard Hint ── */
    .kbd-hint {
      text-align: center;
      font-size: 0.68rem;
      color: var(--text-dim);
      margin-top: 2px;
    }
    .kbd-hint kbd {
      display: inline-block;
      padding: 1px 5px;
      border: 1px solid var(--border-solid);
      border-radius: 4px;
      background: var(--bg-grad-1);
      font-family: inherit;
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--text-muted);
    }

    @media (max-width: 480px) {
      body { padding: 12px; }
      .card { padding: 24px 18px; }
      h1 { font-size: 1.3rem; }
      .stats { grid-template-columns: repeat(3, 1fr); gap: 6px; }
      .stat-val { font-size: 1.2rem; }
      .stats-secondary { grid-template-columns: repeat(2, 1fr); }
      .theme-toggle { top: 10px; right: 10px; width: 36px; height: 36px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">🌙</button>

  <div class="wrapper">
    <div class="card">
      <div class="header">
        <div class="icon-wrap" aria-hidden="true">✏️</div>
        <h1>Contador de Caracteres</h1>
        <p class="subtitle">Analise seu texto em tempo real</p>
      </div>

      <div class="textarea-wrap">
        <textarea
          id="textInput"
          placeholder="Cole ou digite seu texto aqui..."
          aria-label="Texto para analisar"
          autofocus
        ></textarea>
        <div class="char-counter" id="charCounter">0</div>
      </div>

      <div class="limit-row">
        <span class="limit-label">📌 Limite</span>
        <input
          class="limit-input"
          type="number"
          id="limitInput"
          placeholder="Ex: 280"
          min="1"
          aria-label="Limite de caracteres"
        >
      </div>

      <!-- Social Media Presets -->
      <div class="presets">
        <div class="presets-label">Redes sociais</div>
        <div class="presets-grid" id="presetsGrid">
          <button class="preset-btn" data-limit="280" data-name="X / Twitter" aria-label="X / Twitter - 280 caracteres">
            <span class="preset-icon">𝕏</span>
            <span class="preset-name">X</span>
            <span class="preset-limit">280</span>
          </button>
          <button class="preset-btn" data-limit="63206" data-name="Instagram (legenda)" aria-label="Instagram - 63206 caracteres">
            <span class="preset-icon">📷</span>
            <span class="preset-name">Instagram</span>
            <span class="preset-limit">63k</span>
          </button>
          <button class="preset-btn" data-limit="65536" data-name="Facebook (post)" aria-label="Facebook - 65536 caracteres">
            <span class="preset-icon">👤</span>
            <span class="preset-name">Facebook</span>
            <span class="preset-limit">65k</span>
          </button>
          <button class="preset-btn" data-limit="70" data-name="Facebook (comentário)" aria-label="Facebook comentário - 70 caracteres">
            <span class="preset-icon">💬</span>
            <span class="preset-name">FB Coment.</span>
            <span class="preset-limit">70</span>
          </button>
          <button class="preset-btn" data-limit="65536" data-name="WhatsApp (status)" aria-label="WhatsApp Status - 65536 caracteres">
            <span class="preset-icon">📱</span>
            <span class="preset-name">WA Status</span>
            <span class="preset-limit">65k</span>
          </button>
          <button class="preset-btn" data-limit="256" data-name="Threads" aria-label="Threads - 256 caracteres">
            <span class="preset-icon">🧵</span>
            <span class="preset-name">Threads</span>
            <span class="preset-limit">256</span>
          </button>
          <button class="preset-btn" data-limit="150" data-name="LinkedIn (resumo)" aria-label="LinkedIn resumo - 150 caracteres">
            <span class="preset-icon">💼</span>
            <span class="preset-name">LinkedIn</span>
            <span class="preset-limit">150</span>
          </button>
          <button class="preset-btn" data-limit="3000" data-name="LinkedIn (post)" aria-label="LinkedIn post - 3000 caracteres">
            <span class="preset-icon">📋</span>
            <span class="preset-name">LN Post</span>
            <span class="preset-limit">3k</span>
          </button>
          <button class="preset-btn" data-limit="500" data-name="Bluesky" aria-label="Bluesky - 500 caracteres">
            <span class="preset-icon">🦋</span>
            <span class="preset-name">Bluesky</span>
            <span class="preset-limit">500</span>
          </button>
          <button class="preset-btn" data-limit="491" data-name="Mastodon" aria-label="Mastodon - 491 caracteres">
            <span class="preset-icon">🐘</span>
            <span class="preset-name">Mastodon</span>
            <span class="preset-limit">491</span>
          </button>
          <button class="preset-btn" data-limit="2200" data-name="YouTube (título)" aria-label="YouTube título - 2200 caracteres">
            <span class="preset-icon">🎬</span>
            <span class="preset-name">YT Título</span>
            <span class="preset-limit">2.2k</span>
          </button>
          <button class="preset-btn" data-limit="5000" data-name="YouTube (descrição)" aria-label="YouTube descrição - 5000 caracteres">
            <span class="preset-icon">📹</span>
            <span class="preset-name">YT Desc.</span>
            <span class="preset-limit">5k</span>
          </button>
          <button class="preset-btn" data-limit="100" data-name="TikTok (legenda)" aria-label="TikTok legenda - 100 caracteres">
            <span class="preset-icon">🎵</span>
            <span class="preset-name">TikTok</span>
            <span class="preset-limit">100</span>
          </button>
          <button class="preset-btn" data-limit="40" data-name="Telegram (bio)" aria-label="Telegram bio - 40 caracteres">
            <span class="preset-icon">✈️</span>
            <span class="preset-name">TG Bio</span>
            <span class="preset-limit">40</span>
          </button>
          <button class="preset-btn" data-limit="160" data-name="SMS" aria-label="SMS - 160 caracteres">
            <span class="preset-icon">💌</span>
            <span class="preset-name">SMS</span>
            <span class="preset-limit">160</span>
          </button>
          <button class="preset-btn" data-limit="300" data-name="Reddit (título)" aria-label="Reddit título - 300 caracteres">
            <span class="preset-icon">🔴</span>
            <span class="preset-name">Reddit</span>
            <span class="preset-limit">300</span>
          </button>
          <button class="preset-btn" data-limit="80" data-name="GitHub (commit)" aria-label="GitHub commit - 80 caracteres">
            <span class="preset-icon">🐙</span>
            <span class="preset-name">GH Commit</span>
            <span class="preset-limit">80</span>
          </button>
          <button class="preset-btn" data-limit="280" data-name="GitHub (PR)" aria-label="GitHub PR - 280 caracteres">
            <span class="preset-icon">🔀</span>
            <span class="preset-name">GH PR</span>
            <span class="preset-limit">280</span>
          </button>
        </div>
      </div>

      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-icon">🔤</div>
          <div class="stat-val" id="charCount">0</div>
          <div class="stat-label">Caracteres</div>
        </div>
        <div class="stat">
          <div class="stat-icon">📝</div>
          <div class="stat-val" id="wordCount">0</div>
          <div class="stat-label">Palavras</div>
        </div>
        <div class="stat">
          <div class="stat-icon">💬</div>
          <div class="stat-val" id="sentenceCount">0</div>
          <div class="stat-label">Frases</div>
        </div>
      </div>

      <div class="stats-secondary">
        <div class="stat-s">
          <div class="stat-val" id="paragraphCount">0</div>
          <div class="stat-label">Parágrafos</div>
        </div>
        <div class="stat-s">
          <div class="stat-val" id="lineCount">0</div>
          <div class="stat-label">Linhas</div>
        </div>
        <div class="stat-s">
          <div class="stat-val" id="charNoSpace">0</div>
          <div class="stat-label">Sem espaços</div>
        </div>
        <div class="stat-s">
          <div class="stat-val" id="avgWordLen">0</div>
          <div class="stat-label">Média/palavra</div>
        </div>
      </div>

      <div class="reading-bar">
        <span class="rb-icon">📖</span>
        <div class="rb-text">
          Tempo de leitura: <strong id="readingTime">0 min</strong>
          &nbsp;·&nbsp;
          Tempo de fala: <strong id="speakingTime">0 min</strong>
        </div>
      </div>

      <div class="actions">
        <button onclick="copyText()" aria-label="Copiar texto">
          📋 Copiar
        </button>
        <button onclick="clearText()" aria-label="Limpar texto">
          🗑️ Limpar
        </button>
        <button onclick="exportText()" aria-label="Exportar como TXT">
          📄 Exportar
        </button>
      </div>

      <div class="card-footer">
        <span>Dev Aleksandro Alves</span>
      </div>
    </div>

    <div class="kbd-hint">
      <kbd>Ctrl+A</kbd> selecionar tudo · <kbd>Ctrl+V</kbd> colar
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const $ = id => document.getElementById(id);
    const textInput = $('textInput');
    const charCounter = $('charCounter');
    const limitInput = $('limitInput');
    const progressWrap = $('progressWrap');
    const progressBar = $('progressBar');
    const toast = $('toast');

    /* ── Theme ── */
    const html = document.documentElement;
    const themeBtn = $('themeToggle');
    const saved = localStorage.getItem('counterTheme') || 'dark';
    html.setAttribute('data-theme', saved);
    themeBtn.textContent = saved === 'dark' ? '🌙' : '☀️';

    themeBtn.addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('counterTheme', next);
      themeBtn.textContent = next === 'dark' ? '🌙' : '☀️';
    });

    /* ── Toast ── */
    let toastTimer;
    function showToast(msg) {
      clearTimeout(toastTimer);
      toast.textContent = msg;
      toast.classList.add('show');
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    /* ── Analyze ── */
    function analyze() {
      const text = textInput.value;
      const len = text.length;

      // Characters
      $('charCount').textContent = len.toLocaleString('pt-BR');
      charCounter.textContent = len.toLocaleString('pt-BR');

      // Words
      const words = text.trim() ? text.trim().split(/\s+/) : [];
      const wordCount = words.length;
      $('wordCount').textContent = wordCount.toLocaleString('pt-BR');

      // Sentences
      const sentences = text.trim() ? text.split(/[.!?]+/).filter(s => s.trim()).length : 0;
      $('sentenceCount').textContent = sentences;

      // Paragraphs
      const paragraphs = text.trim() ? text.split(/\n\s*\n/).filter(p => p.trim()).length : 0;
      $('paragraphCount').textContent = paragraphs;

      // Lines
      const lines = text.trim() ? text.split('\n').length : 0;
      $('lineCount').textContent = lines;

      // Characters without spaces
      const noSpace = text.replace(/\s/g, '').length;
      $('charNoSpace').textContent = noSpace.toLocaleString('pt-BR');

      // Average word length
      const avgLen = wordCount > 0 ? (noSpace / wordCount).toFixed(1) : '0';
      $('avgWordLen').textContent = avgLen;

      // Reading time (200 wpm Portuguese)
      const readMin = Math.ceil(wordCount / 200);
      $('readingTime').textContent = readMin < 1 ? '< 1 min' : `${readMin} min`;

      // Speaking time (130 wpm Portuguese)
      const speakMin = Math.ceil(wordCount / 130);
      $('speakingTime').textContent = speakMin < 1 ? '< 1 min' : `${speakMin} min`;

      // Limit
      const limit = parseInt(limitInput.value);
      if (limit && limit > 0) {
        progressWrap.classList.add('show');
        const pct = Math.min((len / limit) * 100, 100);
        progressBar.style.width = pct + '%';

        charCounter.className = 'char-counter';
        progressBar.className = 'progress-bar';

        if (len > limit) {
          charCounter.classList.add('over');
          progressBar.classList.add('over');
          charCounter.textContent = `${len} / ${limit}  ❗`;
        } else if (len > limit * 0.85) {
          charCounter.classList.add('warn');
          progressBar.classList.add('warn');
          charCounter.textContent = `${len} / ${limit}`;
        } else {
          charCounter.textContent = `${len} / ${limit}`;
        }
      } else {
        progressWrap.classList.remove('show');
        charCounter.className = 'char-counter';
      }
    }

    /* ── Actions ── */
    function copyText() {
      if (!textInput.value) { showToast('Nada para copiar'); return; }
      navigator.clipboard.writeText(textInput.value).then(() => showToast('✅ Copiado!'));
    }

    function clearText() {
      textInput.value = '';
      analyze();
      textInput.focus();
      showToast('🗑️ Limpo');
    }

    function exportText() {
      if (!textInput.value) { showToast('Nada para exportar'); return; }
      const blob = new Blob([textInput.value], { type: 'text/plain;charset=utf-8' });
      const link = document.createElement('a');
      link.download = `texto-${new Date().toISOString().slice(0,10)}.txt`;
      link.href = URL.createObjectURL(blob);
      link.click();
      URL.revokeObjectURL(link.href);
      showToast('📄 Exportado!');
    }

    /* ── Events ── */
    textInput.addEventListener('input', analyze);
    limitInput.addEventListener('input', analyze);

    // Restore limit from localStorage
    const savedLimit = localStorage.getItem('counterLimit');
    if (savedLimit) { limitInput.value = savedLimit; }
    limitInput.addEventListener('input', () => {
      localStorage.setItem('counterLimit', limitInput.value);
      updateActivePreset();
    });

    /* ── Presets ── */
    function updateActivePreset() {
      const val = parseInt(limitInput.value);
      document.querySelectorAll('.preset-btn').forEach(btn => {
        const limit = parseInt(btn.dataset.limit);
        btn.classList.toggle('active', limit === val);
      });
    }

    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const limit = parseInt(btn.dataset.limit);
        limitInput.value = limit;
        localStorage.setItem('counterLimit', limit);
        updateActivePreset();
        analyze();
        textInput.focus();
      });
    });

    updateActivePreset();
    analyze();
  </script>
</body>
</html>
